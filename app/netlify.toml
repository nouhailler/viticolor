[build]
  base = "app"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — every route resolves to the app shell.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# The service worker must never be cached by the CDN, so updates ship immediately.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Hashed build assets are immutable.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
